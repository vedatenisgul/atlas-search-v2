[pytest]
# Root the test tree at tests/ and treat the project root as importable so
# ``from core import config`` resolves without an editable install.
testpaths = tests
addopts = -ra
filterwarnings =
    # Starlette 1.0 on Python 3.12+ emits a deprecation warning about the
    # TemplateResponse(request, ...) call shape for older request-less
    # overloads; our _render_page helper explicitly supports both shapes,
    # so the warning is noise under test.
    ignore::DeprecationWarning
